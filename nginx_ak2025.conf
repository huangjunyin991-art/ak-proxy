# ak2025.vip Nginx 配置

upstream ak2018_backend {
    server ak2018.vip:443;
    keepalive 64;
}

# HTTP重定向到HTTPS
server {
    listen 80;
    server_name ak2025.vip;
    return 301 https://$server_name$request_uri;
}

# HTTPS服务
server {
    listen 443 ssl http2;
    server_name ak2025.vip;

    # SSL证书
    ssl_certificate /etc/letsencrypt/live/ak2025.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ak2025.vip/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 日志
    access_log /var/log/nginx/ak2025_access.log;
    error_log /var/log/nginx/ak2025_error.log warn;

    # 根路径重定向到登录页
    location = / {
        if ($cookie_ak_persist = "1") {
            return 302 /pages/home.html?first=true;
        }
        return 302 /pages/account/login.html;
    }

    location = /index.html {
        if ($cookie_ak_persist = "1") {
            return 302 /pages/home.html?first=true;
        }
        return 302 /pages/account/login.html;
    }

    # 登录API - 走本地代理（白名单已去除）
    location ~ ^/RPC/Login$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Content-Type $http_content_type;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
    }

    # 用户资产API - 走本地代理
    location ^~ /RPC/public_IndexData {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Content-Type $http_content_type;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
    }

    # 所有RPC请求 - 走本地代理
    location /RPC/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Content-Type $http_content_type;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
    }

    # 管理后台 - 走本地代理
    location /admin {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;
    }

    # 管理后台API - 走本地代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存
    location ~* \.(css|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass https://ak2018_backend;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host ak2018.vip;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # JS文件替换API域名
    location ~* \.js$ {
        proxy_pass https://ak2018_backend;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host ak2018.vip;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
        proxy_set_header Accept-Encoding "";

        sub_filter_types application/javascript text/javascript;
        sub_filter_once off;
        sub_filter 'https://www.akapi1.com' 'https://ak2025.vip';
        sub_filter 'https://ak2018.vip' 'https://ak2025.vip';
        sub_filter 'ak2018.vip' 'ak2025.vip';
    }

    # 默认代理到ak2018并替换域名
    location / {
        proxy_pass https://ak2018_backend;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host ak2018.vip;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36";
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;

        sub_filter_types text/html text/javascript application/javascript;
        sub_filter_once off;
        sub_filter 'https://www.akapi1.com' 'https://ak2025.vip';
        sub_filter 'https://ak2018.vip' 'https://ak2025.vip';
        sub_filter 'ak2018.vip' 'ak2025.vip';
    }
}
